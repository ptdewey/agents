services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - tempo
    ports:
      - "${PI_OTEL_COLLECTOR_GRPC_PORT:-14317}:4317"
      - "${PI_OTEL_COLLECTOR_HTTP_PORT:-14318}:4318"
      - "${PI_OTEL_COLLECTOR_PROM_PORT:-19464}:9464"

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_data:/prometheus
    ports:
      - "${PI_PROMETHEUS_PORT:-19090}:9090"

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo.yml:/etc/tempo/tempo.yml:ro
      - ./tempo_data:/tmp/tempo
    ports:
      - "${PI_TEMPO_PORT:-13200}:3200"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: ${PI_GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${PI_GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana_data:/var/lib/grafana
    ports:
      - "${PI_GRAFANA_PORT:-13000}:3000"